PEK_our_great_navy:0 "Our great navy"
PEK_our_great_navy_desc:0 "WIP"
PEK_intensify_gun_training:0 "Intensify gun training"
PEK_intesify_gun_training_desc:0 "Our troops are not trained in using firearms, they need to be trained by outsiders"
PEK_better_materials:0 "Better materials"
PEK_better_materials_desc:0 "Our materials are under the worlds average quality we should get some experts to help improve the quality"
PEK_submarines_expansions:0 "Submarine expansion"
PEK_submarines_expansions_desc:0 "We need those under water cans to help get rid of enemy ships"
