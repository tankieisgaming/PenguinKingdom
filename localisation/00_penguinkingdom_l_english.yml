l_english:

PEK_the_start_of_the_nation:0 "The start of our nation"
PEK_the_start_of_the_nation_desc:0 "We finally have our own land without any humans"
PEK_rebuilding_the_nation:0 "We must (re)build these lands"
PEK_rebuilding_the_nation_desc:0 "These humans have build up this place with some devices that we can not open without thumbs it is like they know our weaknesses"
PEK_start_exploring_factories:0 "Start exploring factories"
PEK_start_exploring_factories_desc:0 "Lets try to find out what these so called factories are"
PEK_visiting_countries:0 "Visiting countries"
PEK_visiting_countries_desc:0 "Maybe we should try to get an invite from the humans to look at their factories"
PEK_implement_own_ideas:0 "Implementing our own ideas"
PEK_implement_own_ideas_desc:0 "We shall try our own ideas on factories now"
PEK_factory_construction_learning_schools:0 "Factory construction learning schools"
PEK_factory_construction_learning_schools_desc:0 "Now that we know how the factories are build lets teach it to our people"
PEK_expand_existing_factories:0 "Expand on the existing factories"
PEK_expand_existing_factories_desc:0 "They have these massive buildings where when you dump materials some new guns drop out."
PEK_we_need_some_roads:0 "We neeeeeed some roads!"
PEK_we_need_some_roads_desc:0 "We have these fast metal on rubber moving devices they are called cars."
PEK_capital_industrial_push:0 "Capital industrial push"
PEK_capital_industrial_push_desc:0 "We need to build more houses for the people in the big cities, we are with more penguins then humans that lived here."
PEK_build_up_the_countryside:0 "Build up the countryside"
PEK_build_up_the_countryside_desc:0 "Outside of the capital there is a lack of infrastructure, we need to build this side of the country up some more."
PEK_industrial_boost:0 "Industrial boost"
PEK_industrial_boost_desc:0 "Need to boost our industry as its under performing"
PEK_starting_military_construction:0 "Starting military construction"
PEK_starting_military_construction_desc:0 "We have almost no weapons that the humans have, we should build more of those kinds of weapons to fight for our freedom."
PEK_slowly_learn_how_to_use_machines:0 "Slowly learn how to use machines"
PEK_slowly_learn_how_to_use_machines_desc:0 "We must learn how to produce weapons with these machines"
PEK_modifying_the_machines:0 "Modifying the machines"
PEK_modifying_the_machines_desc:0 "The machines are hard to work with in their current state, we shall modify it so we can use it properly"
PEK_teaching_about_the_use_of_machines:0 "Teaching about the use of these machines"
PEK_teaching_about_the_use_of_machines_desc:0 "Now that we have modified the machines we are ready to teach it to our people"
PEK_continuing_building_up_the_military:0 "Continue the military build up."
PEK_continuing_building_up_the_military_desc:0 "Now that we have the basic information and a small amount of factories to build their weapons, we need more factories! MORE!"
PEK_claim_chile:0 "Claim Chile"
PEK_claim_chile_desc:0 "We need more land to live in we do not have enough living space with all these humans living here."
PEK_rally_tha_chilean_penguins:0 "Rally tha Chilean penguins"
PEK_rally_tha_chilean_penguins_desc:0 "We must bolster the pinguins to stand up to their human supressors."
PEK_integrate_tha_chilean_penguins:0 "Integrate tha Chilean penguins"
PEK_integrate_tha_chilean_penguins_desc:0 "These humans will be our pets, they must get used to living under us."
PEK_claim_argentina:0 "Claim Argentinian lands"
PEK_claim_argentina_desc:0 "All these Argentine lands are now ours."
PEK_rally_tha_argentinian_penguins:0 "Rally tha Argentinian penguins"
PEK_rally_tha_argentinian_penguins_desc:0 "Let the pinguins do what they need to do."
PEK_integrate_tha_argentinian_penguins:0 "Integrate tha Argentinian pinguins"
PEK_integrate_tha_argentinian_penguins_desc:0 "Lets supress the humans now"
PEK_invade_peru:0 "Invade Peru"
PEK_invade_peru_desc:0 "We need to get all of our lands where we lived back to us"
PEK_rally_tha_peruvian_penguins:0 "Rally tha Peruvian pinguins"
PEK_rally_tha_peruvian_penguins_desc:0 "Convince our brothers to join us"
PEK_integrate_tha_peruvian_penguins:0 "Integrate the lands our brothers live in"
PEK_integrate_tha_peruvian_penguins_desc:0 "All these lands that are now purely ours should be happier than before"
PEK_form_the_greater_kingdom:0 "Form the Greater Kingdom"
PEK_form_the_greater_kingdom_desc:0 "We can now call ourselves the Great Penguin Kingdom"
PEK_claim_namibia_southafrica:0 "Claim Namibia and South African lands
PEK_claim_namibia_southafrica_desc:0 "We shall take these lands back from these humans"
PEK_rally_tha_south_african_penguins:0 "Rally tha South African pinguins"
PEK_rally_tha_south_african_penguins_desc:0 "lets use propaganda to get the pinguins to join us."
PEK_integrate_tha_south_african_penguins:0 "Integrate tha South African penguins"
PEK_integrate_tha_south_african_penguins_desc:0 "All these african lands shall be made ours"
PEK_claim_australia:0 "Claim Australia"
PEK_claim_australia_desc:0 "This enormous land mass should be for the penguins, let it be ours"
PEK_rally_tha_australian_penguins:0 "Rally tha Australian pinguins"
PEK_rally_tha_australian_penguins_desc:0 "It is difficult to reach every pinguin but it must be done for this big land mass"
PEK_integrate_tha_australian_penguins:0 "Integrate tha Australian pinguins"
PEK_integrate_tha_australian_penguins_desc:0 "We need to use these lands for the most part it would be a good vacation home"
PEK_claim_new_zealand:0 "Claim New Zealand"
PEK_claim_new_zealand_desc:0 "This is even better then the enormous land mass next door we must have this at all costs!"
PEK_rally_tha_new_zealanders_penguins:0 "Rally tha New Zealand pinguins"
PEK_rally_tha_new_zealanders_pinguins_desc:0 "With this great land there are already a lot of pinguins to support us"
PEK_integrate_tha_new_zealanders_penguins:0 "Integrate tha New Zealanders penguins"
PEK_integrate_tha_new_zealanders_pinguins_desc:0 "These awesome lands are great to live in they will be ours"
PEK_need_more_troops:0 "We need more troops to defend our lands"
PEK_need_more_troops_desc:0 "Hardly anyone is joining the armed forces we need way more people or penguins to throw at our enemies"
PEK_penguin_commandos:0 "Penguin Commandos"
PEK_penguin_commandos_desc:0 "We have some special forces that the world know about since they have been filmed a few times before. Our teamleader skipper has trained a good team with the members being, Kowalski the planner, Private the soldier, Rico the demolition expert. They need to train more squads like them."
PEK_make_a_military:0 "Make a military"
PEK_make_a_military_desc:0 "All these humans have so called armies maybe we should make one aswell"
PEK_build_the_army:0 "Build the army"
PEK_build_the_army_desc:0 "These armies everyone around the world has, contain metal boxes firing big exploding metal shells and small long sticks with metal firing something very fast"
PEK_mobilize_the_walking_birds:0 "Mobilize the walking birds"
PEK_mobilize_the_walking_birds_desc:0 "The state of our army is terrible, we must begin with recruiting soldiers"
PEK_training_camps:0 "Training camps"
PEK_training_camps_desc:0 "Our pinguins have no military experience, we must train them to now the basics"
PEK_terraforming_in_the_military:0 "Terraforming in the military"
PEK_terraforming_in_the_military_desc:0 "We have heard about so called trenchens and we shall dig then fast and deep"
PEK_use_enemy_guns:0 "Use enemy guns"
PEK_use_enemy_guns_desc:0 "If we run out of our own guns, we just take the enemies guns!"
PEK_dynamic_army_fighting_terrain:0 "Dynamic army fighting terrain"
PEK_dynamic_army_fighting_terrain_desc:0 "We must train our soldiers so they now how to fight on every terrain"
PEK_now_we_have_good_army:0 "Now we have good army"
PEK_now_we_have_good_army_desc:0 "The combination of our walking soldiers and our metal boxes is fenominal"
PEK_winter_army:0 "winter_army"
PEK_winter_army_desc:0 "Seeing as our army is advanced in cold regions let it be our specialty"
PEK_technology_for_steel_driving_things_who_are_fast:0 "technology for steel driving things who are fast"
PEK_technology_for_steel_driving_things_who_are_fast_desc:0 "These metal boxes are barely good enough to count as metal boxes but they are fast, very fast"
PEK_better_armor_but_less_speed:0 "better armor but less speed"
PEK_better_armor_but_less_speed_desc:0 "Now these metal boxes will be harder to get through the armor but they get slower??"
PEK_great_armor_but_very_slow:0 "great armor but very slow"
PEK_great_armor_but_very_slow_desc:0 "These protective deadly boxes are awesome but why are they so slow..."
PEK_better_material_quality:0 "better material quality"
PEK_better_material_quality_desc:0 "Our materials will be better quality with all these new methods of production"
PEK_great_steel_driving_logistics:0 "great steel driving logistics"
PEK_great_steel_driving_logistics_desc:0 "We need something better at driving with protecting our troops"
PEK_start_the_navy:0 "Start the navy"
PEK_start_the_navy_desc:0 "We need floating metal boxes that fire massive metal bombs to fight on a global scale"
PEK_expand_the_navy:0 "Expand the navy"
PEK_expand_the_navy_desc:0 "The group of floating things is non- existent, it shall grow"
PEK_improve_ship_engines:0 "improve ship engines"
PEK_improve_ship_engines_desc:0 "Our floating things were slow, so we improved their engines"
PEK_real_battle_training:0 "real battle training"
PEK_real_battle_training_desc:0 "Our sailors have no experience in battle, we shall prepare them"
PEK_better_materials_little_ships:0 "better materials little ships"
PEK_better_materials_little_ships_desc:0 "The armor on our small floating things was really thin, it must be thicker"
PEK_better_materials_capital_ships:0 "Better materials capital ships"
PEK_better_materials_capital_ships_desc:0 "The armor on our big floating things was too thin, it must be thicker"
PEK_our_great_navy:0 "Our great navy"
PEK_our_great_navy_desc:0 "We have trained our navy and now it is ready to take on everything!"
PEK_intensify_gun_training:0 "Intensify gun training"
PEK_intesify_gun_training_desc:0 "Our troops are not trained in using firearms, they need to be trained by outsiders"
PEK_better_materials:0 "Better materials"
PEK_better_materials_desc:0 "Our materials are under the worlds average quality we should get some experts to help improve the quality"
PEK_submarines_expansions:0 "Submarine expansion"
PEK_submarines_expansions_desc:0 "We need those under water cans to help get rid of enemy ships"
PEK_capital_ships_buildup:0 "New Capital ships"
PEK_capital_ships_buildup_desc:0 "We need ships with bigger cannons that can fire more rounds to destroy our enemies"
PEK_screens_buildup:0 "We need to build some destroyers"
PEK_screens_buildup_desc:0 "We need some ships to counter the underwater cans"
PEK_start_the_air:0 "Start the air"
PEK_start_the_air_desc:0 "These humans have been building these flying metal boxes, we should build some of our own"
PEK_extend_pilot_training:0 "Extend pilot training"
PEK_extend_pilot_training_desc:0 "We need more pinguins to fly those metal boxes, we have more of them then pinguins"
PEK_increase_production_of_air:0 "Increase air production"
PEK_increase_production_of_air_desc:0 "We need more metal bins that fly"
PEK_expand_air_bases:0 "Expand airbases"
PEK_expand_air_bases_desc:0 "We need more long concrete roads so we can launch the metal death traps"
PEK_putting_weapons_on_planes:0 "Putting bigger guns on planes"
PEK_putting_weapons_on_planes_desc:0 "Put massive guns on the flying metal traps"
PEK_cannons_on_planes:0 "Cannons on planes"
PEK_cannons_on_planes_desc:0 "apparently there are bigger guns that we can put on these flying things"
PEK_spy_planes:0 "Spy planes"
PEK_spy_planes_desc:0 "Use the flying metal to penetrate our enemies"
PEK_putting_bombs_on_tactical_planes:0 "Bombs on planes"
PEK_putting_bombs_on_tactical_planes_desc:0 "Those flying metal thingies can carry big boom devices apparently???"
PEK_bigger_bombs_on_bigger_planes:0 "Bigger bombs on bigger planes"
PEK_bigger_bombs_on_bigger_planes_desc:0 "We need room for bigger boom thingies so that we can delete more with less flying metal."
PEK_nuclear_research:0 "Nuclear Research"
PEK_nuclear_research_push_desc:0 "We need more boom things to get rid of these humans, our top scientists say that this new boom will end a country"
PEK_secret_underground_stash:0 "secret underground stash"
PEK_secret_underground_stash_desc:0 "We have found some weapons of mass destruction that our scientists have been hiding."