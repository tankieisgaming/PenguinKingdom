PEK_capital_ships_buildup_desc:0 "We need ships with bigger cannons that can fire more rounds to destroy our enemies"
PEK_screens_buildup:0 "We need to build some destroyers"
PEK_screens_buildup_desc:0 "We need some ships to counter the underwater cans"
